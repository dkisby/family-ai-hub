name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      deployBackendAPI:
        description: 'Deploy backend API resources'
        required: true
        default: true
        type: boolean
      deployFrontendUI:
        description: 'Deploy frontend UI resources'
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_BACKEND_API: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deployBackendAPI || 'true' }}
  DEPLOY_FRONTEND_UI: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deployFrontendUI || 'true' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate template (what-if)
        run: |
          az deployment group what-if \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/main.parameters.json \
            --parameters deployBackendAPI=$DEPLOY_BACKEND_API deployFrontendUI=$DEPLOY_FRONTEND_UI

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/main.parameters.json \
            --parameters deployBackendAPI=$DEPLOY_BACKEND_API deployFrontendUI=$DEPLOY_FRONTEND_UI

      - name: Show outputs
        run: |
          az deployment group show \
            --resource-group ${{ secrets.AZURE_RG }} \
            --name main \
            --query properties.outputs
