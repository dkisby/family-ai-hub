name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Validate template (what-if)
      run: |
        az deployment group what-if \
          --resource-group ${{ secrets.AZURE_RG }} \
          --template-file infra/main.bicep \
          --parameters infra/parameters/main.parameters.json \
          --parameters foundryDefaultModel="gpt-4.1-mini" \
          --parameters foundryModelVersion="2025-04-14" \
          --parameters webuiAadClientId="${{ secrets.WEBUI_AAD_CLIENT_ID }}" \
          --parameters webuiAadClientSecret="${{ secrets.WEBUI_AAD_CLIENT_SECRET }}" \
          --parameters customDomainName="${{ vars.CUSTOM_DOMAIN_NAME }}" \
          --parameters webuiAdminEmail="${{ secrets.WEBUI_ADMIN_EMAIL }}" \
          --parameters deployWebUI=false

  deploy-infra-base:
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy base infrastructure (no WebUI)
      run: |
        az deployment group create \
          --resource-group ${{ secrets.AZURE_RG }} \
          --template-file infra/main.bicep \
          --parameters infra/parameters/main.parameters.json \
          --parameters foundryDefaultModel="gpt-4.1-mini" \
          --parameters foundryModelVersion="2025-04-14" \
          --parameters webuiAadClientId="${{ secrets.WEBUI_AAD_CLIENT_ID }}" \
          --parameters webuiAadClientSecret="${{ secrets.WEBUI_AAD_CLIENT_SECRET }}" \
          --parameters customDomainName="${{ vars.CUSTOM_DOMAIN_NAME }}" \
          --parameters webuiAdminEmail="${{ secrets.WEBUI_ADMIN_EMAIL }}" \
          --parameters deployWebUI=false

  push-image:
    runs-on: ubuntu-latest
    needs: deploy-infra-base
    steps:
    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Push OpenWebUI image to ACR
      run: |
        az acr import \
          --name acrfamilyhub \
          --source ghcr.io/open-webui/open-webui:main \
          --image openwebui:latest \
          --force

  deploy-webui:
    runs-on: ubuntu-latest
    needs: push-image
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: 'Deploy WebUI (phase 1: custom hostname bootstrap)'
      run: |
        az deployment group create \
          --resource-group ${{ secrets.AZURE_RG }} \
          --template-file infra/main.bicep \
          --parameters infra/parameters/main.parameters.json \
          --parameters foundryDefaultModel="gpt-4.1-mini" \
          --parameters foundryModelVersion="2025-04-14" \
          --parameters webuiAadClientId="${{ secrets.WEBUI_AAD_CLIENT_ID }}" \
          --parameters webuiAadClientSecret="${{ secrets.WEBUI_AAD_CLIENT_SECRET }}" \
          --parameters customDomainName="${{ vars.CUSTOM_DOMAIN_NAME }}" \
          --parameters webuiAdminEmail="${{ secrets.WEBUI_ADMIN_EMAIL }}" \
          --parameters deployWebUI=true \
          --parameters enableCustomDomainTls=false

    - name: 'Deploy WebUI (phase 2: managed certificate + TLS binding)'
      run: |
        az deployment group create \
          --resource-group ${{ secrets.AZURE_RG }} \
          --template-file infra/main.bicep \
          --parameters infra/parameters/main.parameters.json \
          --parameters foundryDefaultModel="gpt-4.1-mini" \
          --parameters foundryModelVersion="2025-04-14" \
          --parameters webuiAadClientId="${{ secrets.WEBUI_AAD_CLIENT_ID }}" \
          --parameters webuiAadClientSecret="${{ secrets.WEBUI_AAD_CLIENT_SECRET }}" \
          --parameters customDomainName="${{ vars.CUSTOM_DOMAIN_NAME }}" \
          --parameters webuiAdminEmail="${{ secrets.WEBUI_ADMIN_EMAIL }}" \
          --parameters deployWebUI=true \
          --parameters enableCustomDomainTls=true

    - name: Run smoke test
      run: |
        chmod +x scripts/smoke-test.sh
        bash scripts/smoke-test.sh ${{ secrets.AZURE_RG }}

    - name: Setup WebUI admin user
      run: |
        echo "Setting up admin user: ${{ secrets.WEBUI_ADMIN_EMAIL }}"
        az containerapp exec \
          --resource-group ${{ secrets.AZURE_RG }} \
          --name webui-family-hub \
          --command "python3 << 'SETUP_SCRIPT'
import sqlite3
import os
import time

admin_email = '${{ secrets.WEBUI_ADMIN_EMAIL }}'
db_path = '/app/backend/data/webui.db'

# Retry if database not ready
for attempt in range(10):
    try:
        conn = sqlite3.connect(db_path)
        cur = conn.cursor()
        cur.execute(\"UPDATE users SET role='admin' WHERE email=?\", (admin_email,))
        conn.commit()
        print(f'Admin setup complete: {admin_email} (updated {cur.rowcount} user)')
        cur.execute('SELECT email, role FROM users')
        print('Users:', cur.fetchall())
        conn.close()
        break
    except Exception as e:
        if attempt < 9:
            time.sleep(2)
        else:
            print(f'Warning: Could not update admin: {e}')
SETUP_SCRIPT"