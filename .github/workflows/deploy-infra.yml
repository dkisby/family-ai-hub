name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      deployBackendAPI:
        description: 'Deploy backend API resources'
        required: true
        default: true
        type: boolean
      deployFrontendUI:
        description: 'Deploy frontend UI resources'
        required: true
        default: true
        type: boolean
      runTwoPhaseFrontendDomainDeployment:
        description: 'For manual runs, deploy frontend domain in two phases automatically (hostname first, then TLS)'
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_BACKEND_API: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deployBackendAPI || 'true' }}
  DEPLOY_FRONTEND_UI: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deployFrontendUI || 'true' }}
  RUN_TWO_PHASE_FRONTEND_DOMAIN_DEPLOYMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.runTwoPhaseFrontendDomainDeployment || 'true' }}
  REGISTRY_URL: acrfamilyhub.azurecr.io
  FRONTEND_IMAGE_NAME: frontend-family-hub
  BACKEND_IMAGE_NAME: backend-family-hub

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate template (what-if)
        run: |
          if [[ "$RUN_TWO_PHASE_FRONTEND_DOMAIN_DEPLOYMENT" == "true" && "$DEPLOY_FRONTEND_UI" == "true" ]]; then
            echo "Running what-if for phase 1 (hostname registration without TLS)"
            az deployment group what-if \
              --resource-group ${{ secrets.AZURE_RG }} \
              --template-file infra/main.bicep \
              --parameters infra/parameters/main.parameters.json \
              --parameters deployBackendAPI=$DEPLOY_BACKEND_API deployFrontendUI=$DEPLOY_FRONTEND_UI enableFrontendCustomDomainTls=false
          else
            az deployment group what-if \
              --resource-group ${{ secrets.AZURE_RG }} \
              --template-file infra/main.bicep \
              --parameters infra/parameters/main.parameters.json \
              --parameters deployBackendAPI=$DEPLOY_BACKEND_API deployFrontendUI=$DEPLOY_FRONTEND_UI enableFrontendCustomDomainTls=true
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          retry_group_deploy() {
            local args="$1"
            local max_attempts=5
            local attempt=1

            while true; do
              echo "Running deployment attempt ${attempt}/${max_attempts}"
              set +e
              output=$(eval "az deployment group create ${args}" 2>&1)
              code=$?
              set -e

              if [[ $code -eq 0 ]]; then
                echo "$output"
                return 0
              fi

              echo "$output"
              if echo "$output" | grep -q "ContainerAppOperationInProgress" && [[ $attempt -lt $max_attempts ]]; then
                echo "Container App operation in progress; waiting 45s and retrying..."
                sleep 45
                attempt=$((attempt + 1))
                continue
              fi

              echo "Deployment failed and is not retryable or max retries reached."
              return $code
            done
          }

          DEPLOY_ARGS="--resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/main.parameters.json \
            --parameters deployBackendAPI=$DEPLOY_BACKEND_API deployFrontendUI=$DEPLOY_FRONTEND_UI \
            backendAPIImage=$REGISTRY_URL/$BACKEND_IMAGE_NAME:latest \
            frontendUIImage=$REGISTRY_URL/$FRONTEND_IMAGE_NAME:latest"

          if [[ "$RUN_TWO_PHASE_FRONTEND_DOMAIN_DEPLOYMENT" == "true" && "$DEPLOY_FRONTEND_UI" == "true" ]]; then
            echo "Phase 1: register custom hostname without TLS"
            retry_group_deploy "$DEPLOY_ARGS enableFrontendCustomDomainTls=false"

            echo "Ensuring custom hostname exists on frontend container app"
            HOSTNAME_EXISTS=$(az containerapp hostname list \
              --name frontend-family-hub \
              --resource-group ${{ secrets.AZURE_RG }} \
              --query "[?name=='hub.kisbyfamily.com'] | length(@)" \
              -o tsv)

            if [[ "$HOSTNAME_EXISTS" == "0" ]]; then
              az containerapp hostname add \
                --name frontend-family-hub \
                --resource-group ${{ secrets.AZURE_RG }} \
                --hostname hub.kisbyfamily.com
            fi

            echo "Waiting for hostname registration to settle"
            sleep 30

            echo "Phase 2: bind hostname with managed certificate"
            max_attempts=4
            attempt=1
            until az containerapp hostname bind \
              --name frontend-family-hub \
              --resource-group ${{ secrets.AZURE_RG }} \
              --environment env-family-hub \
              --validation-method CNAME \
              --hostname hub.kisbyfamily.com
            do
              if [[ $attempt -ge $max_attempts ]]; then
                echo "Phase 2 failed after $attempt attempts"
                exit 1
              fi
              echo "Phase 2 attempt $attempt failed; waiting before retry"
              sleep 45
              attempt=$((attempt + 1))
            done
          else
            retry_group_deploy "$DEPLOY_ARGS enableFrontendCustomDomainTls=false"

            if [[ "$DEPLOY_FRONTEND_UI" == "true" ]]; then
              HOSTNAME_EXISTS=$(az containerapp hostname list \
                --name frontend-family-hub \
                --resource-group ${{ secrets.AZURE_RG }} \
                --query "[?name=='hub.kisbyfamily.com'] | length(@)" \
                -o tsv)

              if [[ "$HOSTNAME_EXISTS" == "0" ]]; then
                az containerapp hostname add \
                  --name frontend-family-hub \
                  --resource-group ${{ secrets.AZURE_RG }} \
                  --hostname hub.kisbyfamily.com
              fi

              az containerapp hostname bind \
                --name frontend-family-hub \
                --resource-group ${{ secrets.AZURE_RG }} \
                --environment env-family-hub \
                --validation-method CNAME \
                --hostname hub.kisbyfamily.com
            fi
          fi

      - name: Show outputs
        run: |
          az deployment group show \
            --resource-group ${{ secrets.AZURE_RG }} \
            --name main \
            --query properties.outputs
