name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Debug parameters file
      run: |
        echo "=== hex dump of first bytes ==="
        xxd infra/parameters/main.parameters.json | head -5
        echo "=== cat output ==="
        cat infra/parameters/main.parameters.json

    - name: Deploy Bicep to Azure
      run: |
        az deployment group create \
          --resource-group ${{ secrets.AZURE_RG }} \
          --template-file infra/main.bicep \
          --parameters infra/parameters/main.parameters.json

    - name: Run smoke test
      run: |
          chmod +x scripts/smoke-test.sh
          bash scripts/smoke-test.sh ${{ secrets.AZURE_RG }}
