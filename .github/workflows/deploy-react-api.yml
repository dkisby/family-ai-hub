name: Build & Deploy React Frontend + Backend API

on:
  push:
    branches:
      - main
    paths:
      - 'build/frontend/**'
      - 'build/backend/**'
      - '.github/workflows/deploy-react-api.yml'
  workflow_dispatch:

env:
  REGISTRY: acrfamilyhub
  REGISTRY_URL: acrfamilyhub.azurecr.io
  BACKEND_IMAGE_NAME: backend-family-hub
  RESOURCE_GROUP: rg-family-ai-hub
  BACKEND_ACA_NAME: backend-family-hub

jobs:
  # ==========================================
  # FRONTEND: Build React SPA
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'build/frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          VITE_ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          VITE_BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: build/frontend/dist/
          retention-days: 1

  # ==========================================
  # BACKEND: Build Docker image
  # ==========================================
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build/backend

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'build/backend/package-lock.json'

      - name: Lint
        run: npm run lint || true

      - name: Build TypeScript
        run: npm run build

      - name: Azure Login (Workload Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push Docker image
        run: |
          az acr build \
            --registry $REGISTRY \
            --image "$BACKEND_IMAGE_NAME:latest" \
            --image "$BACKEND_IMAGE_NAME:${{ github.sha }}" \
            --file Dockerfile \
            .

      - name: List ACR images
        run: |
          az acr repository show-tags \
            --name $REGISTRY \
            --repository $BACKEND_IMAGE_NAME

  # ==========================================
  # DEPLOY: Frontend to Static Web App
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: success()

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: build/frontend/dist/

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Static Web App
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'upload'
          app_location: 'build/frontend/dist'
          skip_api_build: true

  # ==========================================
  # DEPLOY: Backend to Container Apps
  # ==========================================
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: success()

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name $BACKEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --image "$REGISTRY_URL/$BACKEND_IMAGE_NAME:${{ github.sha }}"

      - name: Verify deployment
        run: |
          az containerapp show \
            --name $BACKEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query properties.template.containers[0].image

  # ==========================================
  # TEST: Integration test
  # ==========================================
  test-integration:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 30

      - name: Test backend health
        run: |
          BACKEND_API_URL="${{ secrets.BACKEND_API_URL }}"
          curl -f "$BACKEND_API_URL/health" || exit 1
          echo "✓ Backend is healthy"

      - name: Test frontend accessibility
        run: |
          FRONTEND_URL="https://$(az staticwebapp show -n swa-chatui-hub -g $RESOURCE_GROUP -o json | jq -r .defaultHostname)"
          curl -f "$FRONTEND_URL" || exit 1
          echo "✓ Frontend is accessible"

  # ==========================================
  # NOTIFY: Status notifications
  # ==========================================
  notify:
    runs-on: ubuntu-latest
    needs: [test-integration]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Frontend: ${{ needs.test-integration.result }}"
          echo "Backend: ${{ needs.test-integration.result }}"
          echo "Status: ${{ job.status }}"
