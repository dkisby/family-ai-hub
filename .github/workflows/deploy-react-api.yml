name: Build & Deploy React Frontend + Backend API to Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'build/frontend/**'
      - 'build/backend/**'
      - '.github/workflows/deploy-react-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: acrfamilyhub
  REGISTRY_URL: acrfamilyhub.azurecr.io
  FRONTEND_IMAGE_NAME: frontend-family-hub
  BACKEND_IMAGE_NAME: backend-family-hub
  RESOURCE_GROUP: rg-family-ai-hub
  CONTAINER_APP_ENV: cae-family-ai-hub
  FRONTEND_ACA_NAME: frontend-family-hub
  BACKEND_ACA_NAME: backend-family-hub
  REGION: swedencentral

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Workload Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push frontend Docker image
        run: |
          az acr build \
            --registry $REGISTRY \
            --image "$FRONTEND_IMAGE_NAME:latest" \
            --image "$FRONTEND_IMAGE_NAME:${{ github.sha }}" \
            --file Dockerfile \
            --build-arg VITE_ENTRA_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
            --build-arg VITE_ENTRA_CLIENT_ID="${{ secrets.ENTRA_CLIENT_ID }}" \
            --build-arg VITE_BACKEND_API_URL="${{ secrets.BACKEND_API_URL }}" \
            .

      - name: List ACR images
        run: |
          az acr repository show-tags \
            --name $REGISTRY \
            --repository $FRONTEND_IMAGE_NAME

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build/backend

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'build/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build TypeScript
        run: npm run build

      - name: Azure Login (Workload Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push backend Docker image
        run: |
          az acr build \
            --registry $REGISTRY \
            --image "$BACKEND_IMAGE_NAME:latest" \
            --image "$BACKEND_IMAGE_NAME:${{ github.sha }}" \
            --file Dockerfile \
            .

      - name: List ACR images
        run: |
          az acr repository show-tags \
            --name $REGISTRY \
            --repository $BACKEND_IMAGE_NAME

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: success()

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name $FRONTEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --image "$REGISTRY_URL/$FRONTEND_IMAGE_NAME:${{ github.sha }}"

      - name: Verify frontend deployment
        run: |
          az containerapp show \
            --name $FRONTEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query properties.template.containers[0].image

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: success()

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name $BACKEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --image "$REGISTRY_URL/$BACKEND_IMAGE_NAME:${{ github.sha }}" \
            --set-env-vars FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
                           FOUNDRY_API_KEY="${{ secrets.FOUNDRY_API_KEY }}" \
                           ENTRA_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
                           NODE_ENV=production

      - name: Verify backend deployment
        run: |
          az containerapp show \
            --name $BACKEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query properties.template.containers[0].image

  test-integration:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: success()

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for deployment
        run: sleep 30

      - name: Get frontend URL
        id: frontend-url
        run: |
          FRONTEND_URL=$(az containerapp show \
            --name $FRONTEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Get backend URL
        id: backend-url
        run: |
          BACKEND_URL=$(az containerapp show \
            --name $BACKEND_ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Test backend health
        run: |
          BACKEND_URL="${{ steps.backend-url.outputs.url }}"
          curl -f "$BACKEND_URL/health" || exit 1
          echo "✓ Backend is healthy"

      - name: Test frontend accessibility
        run: |
          FRONTEND_URL="${{ steps.frontend-url.outputs.url }}"
          curl -f "$FRONTEND_URL" || exit 1
          echo "✓ Frontend is accessible"

  notify:
    runs-on: ubuntu-latest
    needs: [test-integration]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Frontend: ${{ needs.test-integration.result }}"
          echo "Backend: ${{ needs.test-integration.result }}"
          echo "Status: ${{ job.status }}"
