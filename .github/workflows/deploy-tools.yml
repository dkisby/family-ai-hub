name: Deploy Tools to WebUI

on:
  workflow_dispatch:

env:
  CONTAINER_APP: webui-family-hub

jobs:
  deploy-tools:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_TOOLS }}

    - name: Upload tools to WebUI volume
      run: |
        set -euo pipefail
        shopt -s nullglob

        run_exec() {
          local remote_cmd="$1"
          script -q -e -c "az containerapp exec --resource-group ${{ secrets.AZURE_RG }} --name $CONTAINER_APP --command \"$remote_cmd\"" /dev/null
        }

        run_exec "sh -lc 'mkdir -p /app/backend/data/tools'"

        for file in tools/*.json; do
          echo "Deploying $file"
          encoded="$(base64 < "$file" | tr -d '\n')"
          remote_file="/app/backend/data/tools/$(basename "$file")"

          run_exec "sh -lc 'printf %s \"$encoded\" | base64 -d > \"$remote_file\"'"
        done

    - name: Restart WebUI revision
      run: |
        az containerapp revision restart \
          --resource-group ${{ secrets.AZURE_RG }} \
          --name $CONTAINER_APP
